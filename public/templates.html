
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f4f4f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 32px 16px; }
  .page { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e2e2dc; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 28px 32px; }
  .card-title { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 20px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; }
  .back-link { font-size: 13px; color: #4f6ef7; text-decoration: none; font-weight: 500; }
  .back-link:hover { text-decoration: underline; }

  .form-grid { display: flex; flex-direction: column; gap: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; padding: 10px 14px;
    border-radius: 8px; border: 1.5px solid #ddddd8;
    background: #fafaf8; color: #1a1a1a;
    font-size: 14px; font-family: inherit; resize: vertical;
    transition: border-color 0.15s;
  }
  .field input::placeholder, .field textarea::placeholder { color: #bbb; }
  .field input:focus, .field textarea:focus {
    outline: none; border-color: #4f6ef7;
    background: #fff; box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
  }
  .field textarea { height: 110px; }

  .actions { display: flex; gap: 10px; margin-top: 6px; }
  .btn-primary {
    padding: 10px 24px; border-radius: 8px; border: none;
    background: #1a1a1a; color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: background 0.15s;
  }
  .btn-primary:hover { background: #333; }
  .btn-secondary {
    padding: 10px 20px; border-radius: 8px;
    border: 1.5px solid #ddddd8; background: #fafaf8;
    color: #666; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: background 0.15s;
  }
  .btn-secondary:hover { background: #f0f0ec; }

  .edit-banner {
    display: none; background: #f0f4ff; border: 1px solid #c5d0f8;
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    color: #4f6ef7; font-weight: 500; margin-bottom: 14px;
  }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead tr { border-bottom: 2px solid #ebebE7; }
  th { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 14px; text-align: left; }
  td { padding: 12px 14px; color: #1a1a1a; border-bottom: 1px solid #f0f0ec; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }
  .td-id { color: #aaa; font-size: 12px; font-family: monospace; }
  .td-name { font-weight: 600; }
  .td-subject { color: #555; }
  .td-actions { display: flex; gap: 8px; }
  .btn-edit {
    padding: 5px 14px; border-radius: 6px; border: 1.5px solid #ddddd8;
    background: #fafaf8; color: #444; font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-edit:hover { border-color: #4f6ef7; color: #4f6ef7; background: #f0f4ff; }
  .btn-delete {
    padding: 5px 14px; border-radius: 6px; border: 1.5px solid #f5c0bb;
    background: #fdf0f0; color: #c0392b; font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-delete:hover { background: #fae0df; border-color: #e0a09a; }
  .empty-state { text-align: center; padding: 32px 0; color: #bbb; font-size: 14px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }
</style>

<div class="page">
  <div class="card">
    <div class="top-bar" style="margin-bottom:20px;">
      <span style="font-size:20px;font-weight:600;color:#1a1a1a;">Email templates</span>
      <a href="index.html" class="back-link">← Back to send email</a>
    </div>

    <div class="edit-banner" id="editBanner">Editing template — save to update or clear to cancel</div>

    <div class="form-grid">
      <input type="hidden" id="templateId">
      <div class="field">
        <label>Name</label>
        <input type="text" id="name" placeholder="e.g. Welcome email" />
      </div>
      <div class="field">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="Email subject line" />
      </div>
      <div class="field">
        <label>Body</label>
        <textarea id="body" placeholder="Write the email body..."></textarea>
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" onclick="saveTemplate()">Save template</button>
      <button class="btn-secondary" onclick="resetForm()">Clear</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Saved templates</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:80px;">ID</th>
            <th>Name</th>
            <th>Subject</th>
            <th style="width:140px;">Actions</th>
          </tr>
        </thead>
        <tbody id="templateTable"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function getTemplates() { return JSON.parse(localStorage.getItem("templates") || "[]"); }
function saveTemplates(list) { localStorage.setItem("templates", JSON.stringify(list)); }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function loadTemplates() {
  const data = getTemplates();
  const tbody = document.getElementById("templateTable");
  tbody.innerHTML = "";
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">No templates yet — create one above</div></td></tr>';
    return;
  }
  data.forEach(t => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="td-id">#${String(t.id).slice(-5)}</td>
      <td class="td-name">${t.name}</td>
      <td class="td-subject">${t.subject}</td>
      <td><div class="td-actions">
        <button class="btn-edit" onclick='editTemplate(${JSON.stringify(t)})'>Edit</button>
        <button class="btn-delete" onclick='deleteTemplate(${t.id})'>Delete</button>
      </div></td>`;
    tbody.appendChild(tr);
  });
}

function saveTemplate() {
  const id = document.getElementById("templateId").value;
  const name = document.getElementById("name").value.trim();
  const subject = document.getElementById("subject").value.trim();
  const body = document.getElementById("body").value.trim();
  if (!name || !subject || !body) { showToast("All fields are required"); return; }
  let templates = getTemplates();
  if (id) {
    templates = templates.map(t => t.id == id ? { ...t, name, subject, body } : t);
    showToast("Template updated");
  } else {
    templates.push({ id: Date.now(), name, subject, body });
    showToast("Template saved");
  }
  saveTemplates(templates);
  loadTemplates();
  resetForm();
}

function editTemplate(t) {
  document.getElementById("templateId").value = t.id;
  document.getElementById("name").value = t.name;
  document.getElementById("subject").value = t.subject;
  document.getElementById("body").value = t.body;
  document.getElementById("editBanner").style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function deleteTemplate(id) {
  if (!confirm("Delete this template?")) return;
  saveTemplates(getTemplates().filter(t => t.id != id));
  loadTemplates();
  showToast("Template deleted");
}

function resetForm() {
  ["templateId","name","subject","body"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("editBanner").style.display = "none";
}

loadTemplates();
</script>
